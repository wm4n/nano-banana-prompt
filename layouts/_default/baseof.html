<!DOCTYPE html>
<html lang="{{ .Site.LanguageCode }}">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{{ if .IsHome }}{{ .Site.Title }} — {{ .Site.Params.description }}{{ else }}{{ .Title }} — {{ .Site.Title }}{{ end }}</title>
  <meta name="description" content="{{ with .Description }}{{ . }}{{ else }}{{ .Site.Params.description }}{{ end }}">
  {{ with .Params.cover }}<meta property="og:image" content="{{ . }}">{{ end }}
  {{ $css := resources.Get "css/main.css" | resources.Minify }}
  <link rel="stylesheet" href="{{ $css.RelPermalink }}">
  <!-- Google Analytics -->
  <script async src="https://www.googletagmanager.com/gtag/js?id=G-M95KDJ85H8"></script>
  <script>
    window.dataLayer = window.dataLayer || [];
    function gtag(){dataLayer.push(arguments);}
    gtag('js', new Date());
    gtag('config', 'G-M95KDJ85H8');
  </script>
</head>
<body>

<header class="site-header">
  <a class="site-logo" href="{{ site.Home.RelPermalink }}">🖼️ <span>Image Gen</span> Prompts</a>
  <span class="header-count">{{ len site.RegularPages }} prompts</span>
  <div class="header-right">
    <input class="header-search" type="search" placeholder="Search prompts…" id="search-input">
  </div>
</header>

{{ block "main" . }}{{ end }}

<footer class="site-footer">
  <p>Prompts collected from the AI community · Powered by <a href="https://gohugo.io" target="_blank">Hugo</a></p>
</footer>

<!-- Lightbox -->
<div class="lightbox" id="lightbox" role="dialog" aria-modal="true">
  <span class="lightbox-close" id="lightbox-close" aria-label="Close">✕</span>
  <img class="lightbox-img" id="lightbox-img" src="" alt="">
</div>

<script>
// ── Lightbox ──
const lb = document.getElementById('lightbox');
const lbImg = document.getElementById('lightbox-img');
document.getElementById('lightbox-close').onclick = () => lb.classList.remove('open');
lb.addEventListener('click', e => { if (e.target === lb) lb.classList.remove('open'); });
document.addEventListener('keydown', e => { if (e.key === 'Escape') lb.classList.remove('open'); });
window.openLightbox = (src, alt) => { lbImg.src = src; lbImg.alt = alt || ''; lb.classList.add('open'); };

// ── Image lightbox on prompt pages + service comparison ──
document.querySelectorAll('.prompt-content img, .service-comparison img').forEach(img => {
  img.addEventListener('click', () => openLightbox(img.src, img.alt));
});

// ── Gallery search + service + tag filter ──
const cards = document.querySelectorAll('.card');
const tagBtns = document.querySelectorAll('.tag-btn[data-tag]');
const serviceBtns = document.querySelectorAll('.service-btn[data-service]');
const searchInput = document.getElementById('search-input');
let activeTag = 'all';
let activeService = 'all';

function applyFilters() {
  const q = (searchInput?.value || '').toLowerCase().trim();
  let visible = 0;
  cards.forEach(card => {
    const tags = (card.dataset.tags || '').toLowerCase();
    const services = (card.dataset.services || '').split(',');
    const title = (card.dataset.title || '').toLowerCase();
    const tagMatch = activeTag === 'all' || tags.includes(activeTag.toLowerCase());
    const serviceMatch = activeService === 'all' || services.includes(activeService);
    const searchMatch = !q || title.includes(q) || tags.includes(q);
    const show = tagMatch && serviceMatch && searchMatch;
    card.hidden = !show;
    if (show) visible++;
  });
  const empty = document.getElementById('gallery-empty');
  if (empty) empty.hidden = visible > 0;
}

tagBtns.forEach(btn => {
  btn.addEventListener('click', () => {
    tagBtns.forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    activeTag = btn.dataset.tag;
    applyFilters();
  });
});

serviceBtns.forEach(btn => {
  btn.addEventListener('click', () => {
    serviceBtns.forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    activeService = btn.dataset.service;
    applyFilters();
  });
});

if (searchInput) searchInput.addEventListener('input', applyFilters);
</script>

</body>
</html>
