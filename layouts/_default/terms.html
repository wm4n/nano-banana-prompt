{{ define "main" }}
<div class="tags-page">
  <h1>Browse by Tag</h1>
  <div class="tags-grid">
    {{ range .Data.Terms.ByCount }}
    <a class="tags-grid-item" href="{{ .Page.RelPermalink }}">
      {{ .Page.Title }} <span class="count">({{ .Count }})</span>
    </a>
    {{ end }}
  </div>
</div>
{{ end }}
