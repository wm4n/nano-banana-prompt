{{ define "main" }}
<div class="tag-page">
  <div class="tag-hero">
    <h1>{{ .Title }}</h1>
    <p>{{ len .Pages }} prompts</p>
  </div>
  <div class="gallery-wrap">
    <div class="gallery">
      {{ range sort .Pages "Params.num" "desc" }}
      {{ if .Params.num }}
      {{ template "card" . }}
      {{ end }}
      {{ end }}
    </div>
  </div>
</div>
{{ end }}
